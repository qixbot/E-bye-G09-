{% extends "base.html" %}

{% block content %}
<div class="upload-page-wrapper">
    <div class="upload-container">
        
        <h1 class="upload-header">📦 List an Item</h1>

        <form action="#" method="POST" enctype="multipart/form-data" class="upload-form">
            
            <div class="upload-dropzone" id="dropzone">
                <input type="file" id="product_images" name="product_images" accept="image/png, image/jpeg" multiple style="display: none;">
                
                <label for="product_images" class="dropzone-label" id="dropzone-label" style="cursor: pointer;">
                    <div class="camera-icon">📸</div>
                    <div class="dropzone-text">Drag & drop photos here, or <span class="click-text" style="color: #ee4d2d;">click to browse</span></div>
                    <div class="dropzone-hint">Max 12 photos • JPG, PNG</div>
                </label>
                
                <div class="file-list-container" id="file-list-container"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="item_title">ITEM TITLE</label>
                <input type="text" id="item_title" name="item_title" class="form-input" placeholder="e.g. Data Structures Textbook (3rd Ed)" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="item_category">CATEGORY</label>
                <div class="select-wrapper">
                    <select id="item_category" name="item_category" class="form-select" required>
                        <option value="" disabled selected>Select a category...</option>
                        <option value="books">📚 Books</option>
                        <option value="gadgets">💻 Gadgets</option>
                        <option value="dorm">🛏️ Dorm Items</option>
                        <option value="fashion">👕 Fashion</option>
                        <option value="beauty">💄 Beauty</option>
                        <option value="sports">⚽ Sports</option>
                        <option value="groceries">🛒 Groceries</option>
                        <option value="stationery">✏️ Stationery</option>
                        <option value="music">🎸 Music</option >
                        <option value="others">📦 Others</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">CONDITION</label>
                <div class="condition-options">
                    
                    <input type="radio" id="cond_new" name="item_condition" value="like_new" class="condition-radio" checked>
                    <label for="cond_new" class="condition-pill">✨ Like New</label>

                    <input type="radio" id="cond_good" name="item_condition" value="good" class="condition-radio">
                    <label for="cond_good" class="condition-pill">👍 Good</label>

                    <input type="radio" id="cond_fair" name="item_condition" value="fair" class="condition-radio">
                    <label for="cond_fair" class="condition-pill">📦 Fair</label>
                    
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="item_price">PRICE (RM)</label>
                <input type="number" id="item_price" name="item_price" class="form-input" placeholder="0.00" step="0.01" min="0" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="item_description">DESCRIPTION</label>
                <textarea id="item_description" name="item_description" class="form-textarea" placeholder="Describe your item... (brand, usage, reason for selling, etc.)" rows="4" required></textarea>
            </div>

            <button type="submit" class="btn-publish">🏷️ Publish Listing</button>

        </form>
    </div>
</div>

<script>
    // --- Advanced File Upload Logic ---
    const fileInput = document.getElementById('product_images');
    const fileListContainer = document.getElementById('file-list-container');
    
    // This array holds ALL our files, keeping track across multiple clicks!
    let selectedFiles = [];

    // When the user selects files...
    fileInput.addEventListener('change', function(event) {
        const newFiles = Array.from(event.target.files);
        
        // Add new files to our running list (max 12)
        newFiles.forEach(file => {
            if (selectedFiles.length < 12) {
                // Prevents uploading the exact same file twice
                if (!selectedFiles.some(f => f.name === file.name && f.size === file.size)) {
                    selectedFiles.push(file);
                }
            }
        });
        
        updateDisplayAndSync();
    });

    // Function triggered when the "X" button is clicked
    function removeFile(index) {
        // Remove 1 item from the array at the specific index
        selectedFiles.splice(index, 1);
        updateDisplayAndSync();
    }

    // This handles both drawing the screen and updating the hidden input
    function updateDisplayAndSync() {
        // 1. Clear the visual container
        fileListContainer.innerHTML = '';
        
        // 2. Re-draw the visual list of file names
        selectedFiles.forEach((file, index) => {
            const fileItem = document.createElement('div');
            fileItem.classList.add('file-item');
            
            // Note: type="button" is crucial so clicking 'x' doesn't submit the whole form!
            fileItem.innerHTML = `
                <div class="file-info">
                    <span class="file-icon">📎</span> 
                    <span style="overflow: hidden; text-overflow: ellipsis;">${file.name}</span>
                </div>
                <button type="button" class="remove-file-btn" onclick="removeFile(${index})">✖</button>
            `;
            
            fileListContainer.appendChild(fileItem);
        });

        // 3. The Magic Trick: Sync the hidden HTML input so Flask gets the right files
        const dataTransfer = new DataTransfer();
        selectedFiles.forEach(file => {
            dataTransfer.items.add(file);
        });
        
        // Overwrite the actual input files with our customized list
        fileInput.files = dataTransfer.files;
    }
</script>
{% endblock %}
